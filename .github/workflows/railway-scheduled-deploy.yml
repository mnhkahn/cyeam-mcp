name: Scheduled Wiki Update and Railway Deploy

on:
  workflow_dispatch:
  schedule:
    # UTC 19:05 = Beijing 03:05. Keep generation + deploy in Railway free tier's
    # Amsterdam off-peak window so queued builds are less likely to miss the slot.
    - cron: "5 19 * * *"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE: cyeam-wiki-mcp
      MPLCONFIGDIR: /tmp/matplotlib

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect run metadata
        id: run-meta
        run: |
          set -euo pipefail

          commit_sha="$(git rev-parse --short HEAD)"
          commit_subject="$(git log -1 --pretty=%s)"
          commit_author="$(git log -1 --pretty=%an)"
          commit_epoch="$(git log -1 --format=%ct)"
          commit_time="$(date -u -d "@$commit_epoch" "+%Y-%m-%dT%H:%M:%SZ")"

          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"
          echo "commit_subject=$commit_subject" >> "$GITHUB_OUTPUT"
          echo "commit_author=$commit_author" >> "$GITHUB_OUTPUT"
          echo "commit_time=$commit_time" >> "$GITHUB_OUTPUT"
          echo "update_time=$commit_time" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements-wiki.txt

      - name: Rebuild wiki generated data
        run: npm run wiki:rebuild

      - name: Test generated index
        run: npm run test:py

      - name: Test server
        run: npm test

      - name: Build server
        run: npm run build

      - name: Commit generated wiki data
        id: generated
        run: |
          set -euo pipefail

          if git diff --quiet -- wiki static; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated wiki changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wiki static
          git commit -m "chore: update generated wiki data"
          git push

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Check deploy window inputs
        id: deploy-check
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY_PUSHED_AT: ${{ github.event.repository.pushed_at }}
          GENERATED_CHANGED: ${{ steps.generated.outputs.changed }}
        run: |
          set -euo pipefail

          commit_sha="$(git rev-parse --short HEAD)"
          commit_subject="$(git log -1 --pretty=%s)"
          commit_author="$(git log -1 --pretty=%an)"
          commit_epoch="$(git log -1 --format=%ct)"
          commit_time="$(date -u -d "@$commit_epoch" "+%Y-%m-%dT%H:%M:%SZ")"
          update_source="latest commit time"
          update_epoch="$commit_epoch"

          if [ -n "${REPOSITORY_PUSHED_AT:-}" ] && [ "$REPOSITORY_PUSHED_AT" != "null" ]; then
            update_source="repository pushed_at"

            if [[ "$REPOSITORY_PUSHED_AT" =~ ^[0-9]+$ ]]; then
              update_epoch="$REPOSITORY_PUSHED_AT"
            else
              update_epoch="$(date -u -d "$REPOSITORY_PUSHED_AT" +%s)"
            fi
          fi

          update_time="$(date -u -d "@$update_epoch" "+%Y-%m-%dT%H:%M:%SZ")"

          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"
          echo "commit_subject=$commit_subject" >> "$GITHUB_OUTPUT"
          echo "commit_author=$commit_author" >> "$GITHUB_OUTPUT"
          echo "commit_time=$commit_time" >> "$GITHUB_OUTPUT"
          echo "update_source=$update_source" >> "$GITHUB_OUTPUT"
          echo "update_time=$update_time" >> "$GITHUB_OUTPUT"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "reason=manual trigger" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$GENERATED_CHANGED" = "true" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "reason=generated wiki data changed" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          now_epoch="$(date -u +%s)"
          age_seconds=$((now_epoch - update_epoch))
          echo "age_seconds=$age_seconds" >> "$GITHUB_OUTPUT"

          if [ "$age_seconds" -le 86400 ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "reason=latest push is within 24 hours" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "reason=latest push is older than 24 hours and generated wiki data did not change" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip deploy
        if: steps.deploy-check.outputs.should_deploy != 'true'
        run: |
          echo "Skipping Railway deploy: ${{ steps.deploy-check.outputs.reason }}."
          echo "Latest commit: ${{ steps.deploy-check.outputs.commit_sha }} ${{ steps.deploy-check.outputs.commit_subject }}"
          echo "Commit time: ${{ steps.deploy-check.outputs.commit_time }}"
          echo "Update time: ${{ steps.deploy-check.outputs.update_time }} (${{ steps.deploy-check.outputs.update_source }})"

      - name: Install Railway CLI
        if: steps.deploy-check.outputs.should_deploy == 'true'
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: steps.deploy-check.outputs.should_deploy == 'true'
        run: railway up --service "$RAILWAY_SERVICE"

      - name: Notify Feishu
        if: always() && (failure() || steps.deploy-check.outputs.should_deploy == 'true')
        env:
          FEISHU_BOT_WEBHOOK: ${{ secrets.FEISHU_BOT_WEBHOOK }}
          DEPLOY_REASON: ${{ steps.deploy-check.outputs.reason }}
          COMMIT_SHA: ${{ steps.deploy-check.outputs.commit_sha || steps.run-meta.outputs.commit_sha }}
          COMMIT_SUBJECT: ${{ steps.deploy-check.outputs.commit_subject || steps.run-meta.outputs.commit_subject }}
          COMMIT_AUTHOR: ${{ steps.deploy-check.outputs.commit_author || steps.run-meta.outputs.commit_author }}
          COMMIT_TIME: ${{ steps.deploy-check.outputs.commit_time || steps.run-meta.outputs.commit_time }}
          UPDATE_TIME: ${{ steps.deploy-check.outputs.update_time || steps.run-meta.outputs.update_time }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail

          if [ -z "${FEISHU_BOT_WEBHOOK:-}" ]; then
            echo "FEISHU_BOT_WEBHOOK is not set; skipping Feishu notification."
            exit 0
          fi

          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ "$JOB_STATUS" = "success" ]; then
            title="cyeam-wiki-mcp Railway 部署成功"
          else
            title="cyeam-wiki-mcp Railway 部署失败"
          fi

          reason="${DEPLOY_REASON:-workflow failed before deploy decision}"
          text="$(printf '%s\n状态：%s\n原因：%s\n仓库：%s\n提交：%s %s\n作者：%s\n提交时间：%s\n更新时间：%s\n运行记录：%s' "$title" "$JOB_STATUS" "$reason" "$GITHUB_REPOSITORY" "$COMMIT_SHA" "$COMMIT_SUBJECT" "$COMMIT_AUTHOR" "$COMMIT_TIME" "$UPDATE_TIME" "$run_url")"

          jq -n --arg text "$text" '{msg_type:"text",content:{text:$text}}' |
            curl -fsS -X POST -H 'Content-Type: application/json' -d @- "$FEISHU_BOT_WEBHOOK"
